<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Destination</title>
</head>
<body>
<form action="https://formsubmit.co/sabrina.castagno@educacionit.com" method="POST">

    <label for="nombre">Nombre:</label><br>
    <input type="text" id="nombre" name="Nombre" required><br><br>

    <label for="email">Email:</label><br>
    <input type="email" id="email" name="Email" required><br><br>

    <label for="comentario">Comentario:</label><br>
    <textarea id="comentario" name="Comentario" required></textarea><br><br>

    <p><strong>Captcha:</strong> ¿Cuánto es 4 + 3?</p>
    <input type="text" id="captcha" required><br><br>

    <!-- Página de agradecimiento -->
    <input type="hidden" name="_next" value="gracias.html">

    <!-- Desactiva el captcha de FormSubmit -->
    <input type="hidden" name="_captcha" value="false">

    <button type="submit">Enviar</button>

</form>

<script>
function validarCaptcha() {
    const respuesta = document.getElementById("captcha").value;

    if (respuesta !== "7") {
        alert("Captcha incorrecto.");
        return false;
    }

    return true;
}

document.querySelector("form").onsubmit = validarCaptcha;
</script>
    
</body>
</html>
